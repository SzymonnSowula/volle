# Redis configuration for Solli

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Security
requirepass solli_dev_password

# Performance
timeout 0
tcp-keepalive 300
