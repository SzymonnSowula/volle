<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solli - Voice Session Operator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --color-primary: #6366f1;
      --color-secondary: #a855f7;
      --color-background: #0f0f0f;
      --color-surface: #1a1a1a;
      --color-surface-hover: #252525;
      --color-text: #ffffff;
      --color-text-muted: #a1a1a1;
      --color-border: #333333;
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
    }
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .home {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 2rem; text-align: center;
    }
    .home h1 {
      font-size: 3.5rem; font-weight: 700; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home p { font-size: 1.2rem; color: var(--color-text-muted); margin-bottom: 2rem; max-width: 500px; }
    .start-button {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: white; border: none; padding: 1rem 3rem; font-size: 1.2rem;
      font-weight: 600; border-radius: 9999px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .start-button:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(99,102,241,0.5); }
    .session { display: flex; flex-direction: column; min-height: 100vh; }
    .session-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    .back-button {
      background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border);
      padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;
    }
    .back-button:hover { background: var(--color-surface-hover); color: var(--color-text); }
    .session-content { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2rem; }
    .voice-section { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .orb-container { position: relative; width: 200px; height: 200px; }
    .orb {
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle, #1a1a1a 0%, #0f0f0f 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; box-shadow: 0 0 40px rgba(99,102,241,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 60px rgba(99,102,241,0.6); } }
    .orb-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .orb-text { font-size: 0.9rem; color: var(--color-text-muted); }
    .orb-rings { position: absolute; inset: 0; }
    .ring {
      position: absolute; border-radius: 50%; border: 2px solid var(--color-primary);
      opacity: 0.3; animation: ripple 2s ease-out infinite;
    }
    .ring:nth-child(1) { inset: 0; animation-delay: 0s; }
    .ring:nth-child(2) { inset: 10px; animation-delay: 0.3s; }
    .ring:nth-child(3) { inset: 20px; animation-delay: 0.6s; }
    @keyframes ripple { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.3); opacity: 0; } }
    .transcript-box {
      margin-top: 1.5rem; max-width: 300px; padding: 1rem;
      background: var(--color-surface); border-radius: 0.75rem;
      border: 1px solid var(--color-border); text-align: center; font-size: 0.9rem;
    }
    .timeline-section { display: flex; flex-direction: column; gap: 1rem; }
    .timeline-title {
      font-size: 0.9rem; font-weight: 600; color: var(--color-text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .timeline-events { display: flex; flex-direction: column; gap: 0.75rem; }
    .timeline-event {
      display: flex; align-items: flex-start; gap: 1rem; padding: 1rem;
      background: var(--color-surface); border-radius: 0.75rem; border: 1px solid var(--color-border);
    }
    .event-icon {
      width: 2rem; height: 2rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0;
    }
    .event-icon.started { background: var(--color-primary); }
    .event-icon.thinking { background: var(--color-secondary); }
    .event-icon.completed { background: var(--color-success); }
    .event-content { flex: 1; }
    .event-content strong { display: block; margin-bottom: 0.25rem; font-size: 0.9rem; }
    .event-content p { color: var(--color-text-muted); font-size: 0.85rem; }
    .event-time { color: var(--color-text-muted); font-size: 0.75rem; }
    .summary-card {
      grid-column: 1 / -1; background: var(--color-surface);
      border: 1px solid var(--color-border); border-radius: 1rem; padding: 1.5rem;
    }
    .summary-card h3 { font-size: 1rem; margin-bottom: 1rem; }
    .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1rem; }
    .stat { text-align: center; padding: 1rem; background: var(--color-surface-hover); border-radius: 0.5rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted); text-transform: uppercase; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 1.2rem; }
    .input-section { margin-top: 1.5rem; display: flex; gap: 0.5rem; }
    .input-section input {
      flex: 1; padding: 0.75rem 1rem; background: var(--color-surface);
      border: 1px solid var(--color-border); border-radius: 0.5rem; color: var(--color-text);
      font-size: 0.9rem;
    }
    .input-section button {
      padding: 0.75rem 1.5rem; background: var(--color-primary); color: white;
      border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600;
    }
    .input-section button:hover { background: var(--color-surface-hover); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function generateMockEvents(intent) {
      const now = Date.now();
      const agentType = intent.toLowerCase().includes('email') || intent.toLowerCase().includes('inbox') ? 'inbox' : intent.toLowerCase().includes('plan') || intent.toLowerCase().includes('calendar') ? 'planning' : 'research';
      return [
        { id: '1', agentName: 'coordinator', eventType: 'thinking', content: 'Analyzing: "' + intent + '"', timestamp: new Date(now - 3000) },
        { id: '2', agentName: 'coordinator', eventType: 'completed', content: 'Routing to: ' + agentType, timestamp: new Date(now - 2500) },
        { id: '3', agentName: agentType, eventType: 'started', content: 'Starting ' + agentType + ' agent', timestamp: new Date(now - 2000) },
        { id: '4', agentName: agentType, eventType: 'thinking', content: 'Processing request...', timestamp: new Date(now - 1500) },
        { id: '5', agentName: agentType, eventType: 'tool_call', content: 'Executing browser tool', timestamp: new Date(now - 1000) },
        { id: '6', agentName: agentType, eventType: 'completed', content: 'Task completed successfully', timestamp: new Date(now - 500) },
      ];
    }

    function VoiceOrb({ isActive, transcript }) {
      return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1.5rem' } },
        React.createElement('div', { className: 'orb-container' },
          React.createElement('div', { className: 'orb-rings' },
            React.createElement('div', { className: 'ring' }),
            React.createElement('div', { className: 'ring' }),
            React.createElement('div', { className: 'ring' })
          ),
          React.createElement('div', { className: 'orb' },
            React.createElement('span', { className: 'orb-icon' }, isActive ? '🎤' : '🔇'),
            React.createElement('span', { className: 'orb-text' }, isActive ? 'Listening...' : 'Click to speak')
          )
        ),
        transcript && React.createElement('div', { className: 'transcript-box' }, transcript)
      );
    }

    function AgentTimeline({ events }) {
      const getIcon = (type) => {
        const icons = { started: '▶', thinking: '💭', tool_call: '🔧', completed: '✓' };
        return icons[type] || '●';
      };
      const getClass = (type) => (type === 'completed' || type === 'tool_result') ? 'completed' : type === 'thinking' ? 'thinking' : 'started';
      const formatTime = (date) => date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      return React.createElement('div', { className: 'timeline-events' },
        events.map((event) =>
          React.createElement('div', { key: event.id, className: 'timeline-event' },
            React.createElement('div', { className: 'event-icon ' + getClass(event.eventType) }, getIcon(event.eventType)),
            React.createElement('div', { className: 'event-content' },
              React.createElement('strong', null, event.agentName.charAt(0).toUpperCase() + event.agentName.slice(1)),
              React.createElement('p', null, event.content)
            ),
            React.createElement('div', { className: 'event-time' }, formatTime(event.timestamp))
          )
        )
      );
    }

    function SummaryCard({ summary, stats }) {
      return React.createElement('div', { className: 'summary-card' },
        React.createElement('h3', null, 'Session Summary'),
        React.createElement('p', null, summary),
        React.createElement('div', { className: 'summary-stats' },
          React.createElement('div', { className: 'stat' }, React.createElement('div', { className: 'stat-value' }, stats.agents), React.createElement('div', { className: 'stat-label' }, 'Agents')),
          React.createElement('div', { className: 'stat' }, React.createElement('div', { className: 'stat-value' }, stats.tools), React.createElement('div', { className: 'stat-label' }, 'Tools')),
          React.createElement('div', { className: 'stat' }, React.createElement('div', { className: 'stat-value' }, stats.duration + 's'), React.createElement('div', { className: 'stat-label' }, 'Duration'))
        )
      );
    }

    function Home({ onStart }) {
      return React.createElement('div', { className: 'home' },
        React.createElement('h1', null, 'Solli'),
        React.createElement('p', null, 'Your voice-native session operator. Converse naturally and let AI agents handle your tasks.'),
        React.createElement('button', { className: 'start-button', onClick: onStart }, 'Start Session')
      );
    }

    function Session({ sessionId, onBack }) {
      const [events, setEvents] = useState([]);
      const [transcript, setTranscript] = useState('');
      const [isConnected] = useState(true);
      const [inputText, setInputText] = useState('');
      const [summary, setSummary] = useState('');

      const sampleIntents = [
        'Search for the latest news on AI',
        'Check my inbox for urgent emails',
        'Schedule a meeting with the team tomorrow',
        'Research competitors in the market',
        'Send an email to John about the project'
      ];

      useEffect(() => {
        const randomIntent = sampleIntents[Math.floor(Math.random() * sampleIntents.length)];
        const timer = setTimeout(() => {
          setEvents(generateMockEvents(randomIntent));
          setTranscript(randomIntent);
        }, 500);
        return () => clearTimeout(timer);
      }, [sessionId]);

      const handleSend = () => {
        if (!inputText.trim()) return;
        setTranscript(inputText);
        setEvents(prev => [...prev, { id: String(prev.length + 1), agentName: 'user', eventType: 'started', content: inputText, timestamp: new Date() }]);
        setInputText('');
      };

      const handleEndSession = () => {
        setSummary('Session processed "' + transcript + '" through the multi-agent system. Coordinator routed to the research agent which completed successfully.');
        setEvents(prev => [...prev, { id: String(prev.length + 1), agentName: 'summary', eventType: 'completed', content: 'Session completed', timestamp: new Date() }]);
      };

      const stats = {
        agents: [...new Set(events.map(e => e.agentName))].length,
        tools: events.filter(e => e.eventType === 'tool_call').length,
        duration: Math.floor(events.length * 0.5)
      };

      return React.createElement('div', { className: 'session' },
        React.createElement('header', { className: 'session-header' },
          React.createElement('h2', null, 'Session: ' + sessionId.slice(0, 8) + '...'),
          React.createElement('div', { style: { display: 'flex', gap: '1rem', alignItems: 'center' } },
            React.createElement('span', { style: { fontSize: '0.875rem', color: isConnected ? 'var(--color-success)' : 'var(--color-error)' } }, isConnected ? '● Connected' : '○ Disconnected'),
            React.createElement('button', { className: 'back-button', onClick: handleEndSession }, 'End Session'),
            React.createElement('button', { className: 'back-button', onClick: onBack }, '← Back')
          )
        ),
        React.createElement('div', { className: 'session-content' },
          React.createElement('div', { className: 'voice-section' },
            React.createElement(VoiceOrb, { isActive: isConnected, transcript: transcript }),
            React.createElement('div', { className: 'input-section' },
              React.createElement('input', { type: 'text', placeholder: 'Type a command...', value: inputText, onChange: (e) => setInputText(e.target.value), onKeyDown: (e) => e.key === 'Enter' && handleSend() }),
              React.createElement('button', { onClick: handleSend }, 'Send')
            )
          ),
          React.createElement('div', { className: 'timeline-section' },
            React.createElement('h3', { className: 'timeline-title' }, 'Agent Activity'),
            React.createElement(AgentTimeline, { events: events })
          ),
          summary && React.createElement(SummaryCard, { summary: summary, stats: stats })
        )
      );
    }

    function App() {
      const [page, setPage] = useState('home');
      const [sessionId, setSessionId] = useState('');

      const handleStart = () => {
        setSessionId(crypto.randomUUID());
        setPage('session');
      };

      if (page === 'home') return React.createElement(Home, { onStart: handleStart });
      if (page === 'session') return React.createElement(Session, { sessionId: sessionId, onBack: () => setPage('home') });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
